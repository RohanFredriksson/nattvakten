services:
  nattvakten:
    build: .
    container_name: nattvakten
    env_file:
      - ${NATTVAKTEN_ENV_FILE:-/etc/nattvakten/nattvakten.env}
    user: "${NATTVAKTEN_UID}:${NATTVAKTEN_GID}"
    ports:
      - "${NATTVAKTEN_PORT:-8765}:8765"
    volumes:
      - /run/nattvakten:/run/nattvakten
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped